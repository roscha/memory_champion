<script src='./The Experiment Factory_ Preview_files/jquery.min.js'></script>

<script src='./The Experiment Factory_ Preview_files/jspsych-call-function.js'></script>

<script src='./designs/design_ME.js'></script>
<script src="./designs/lists.js"></script>
<script src='./The Experiment Factory_ Preview_files/experiment.js'></script>

<script>
$( document ).ready(function() {

    expfactory_finished = false;

    jsPsych.init({
timeline: readingspan_experiment,
display_element: "getDisplayElement",
fullscreen: true,
on_trial_finish: function(data){
addID('readingspan__fmri')
},
on_finish: function(data){
jsPsych.data.localSave(jsPsych.data.getDataByTrialIndex(3).filename+'.csv', 'csv');
expfactory_finished = true;
}
});

});
</script>
</body>
